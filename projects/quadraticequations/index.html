<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Get JSON Object</title>
    <!-- jQuery Library Dependency -->
    <script type="text/javascript" src="http://localhost/js/jquery.js"></script>
    <script type="text/javascript">
    // FIX: Standard lowercase 'jQuery' to prevent execution crashes
    jQuery(document).ready(function($){
        
        $(".button").click(function(){
            $("form").submit();
        });

        $("form").submit(function(event) {
            var d  = $("#d").val();
            var x1 = $("#x1").val();
            var x2 = $("#x2").val();
            event.preventDefault();
            
            var posting = $.post("http://localhost/cgi-bin/quadraticequations", {
                "d" : d,
                "x1" : x1,
                "x2" : x2
            });

            posting.done(function(data, status) {
                $("#data").empty().append(data);
                $("#status").empty().append(status);
                
                // Parse the raw text returned from the NASM executable
                var result = JSON.parse(data);   
                $("#vald").empty().append(result.d);
                $("#valx1").empty().append(result.x1);
                $("#valx2").empty().append(result.x2);
                $("#equation").empty().append(result.equation);
            });
        });

        // Numeric sanitizers for inputs
        $('.number-only').keyup(function(e){
            if(this.value != '-') {
                while(isNaN(this.value)) {
                    this.value = this.value.split('').reverse().join('').replace(/[\D]/i,'').split('').reverse().join('');
                }
            }
        }).on("cut copy paste", function(e){
            e.preventDefault();
        });

        $('.positive-number-only').keyup(function(e){
            while(isNaN(this.value)) {
                this.value = this.value.split('').reverse().join('').replace(/[\D]/i,'').split('').reverse().join('');
            }
        }).on("cut copy paste", function(e){
            e.preventDefault();
        });
    });
    </script>
</head>
<body>
    <h1>Calculate Quadratic Equations</h1>
    <form action="" method="post">
        <p>
            <label style="white-space: nowrap; font-size:larger">&radic;<span style="text-decoration:overline;">d</span> : </label>
            <input class="positive-number-only" type="text" id="d">
            
            <label> x1 : </label>
            <input class="number-only" type="text" id="x1">
            
            <label> x2 : </label>
            <input class="number-only" type="text" id="x2">
            
            <button id="post" class="button" type="submit">Calculate</button>
        </p>

        <h2>For</h2>
        <p>
            &radic;<span style="text-decoration:overline;">d</span> = <span style="font-style: italic;" id="vald"></span><br>
            x1 = <span style="font-style: italic;" id="valx1"></span><br>
            x2 = <span style="font-style: italic;" id="valx2"></span>
        </p>
        
        <h2>the corresponding equation is</h2>
        <h3><span style="font-style: italic;" id="equation"></span></h3>

        <hr>
        <pre>
<strong>Debugging Info</strong>
data   : <span style="color: blue;" id="data"></span>
status : <span style="color: green;" id="status"></span>
        </pre>
    </form>
</body>    
</html>
